server {
    listen 80;
    server_name _;
    root /app/public;

    # Try the static file first, otherwise hand off to the front controller.
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Only the Symfony front controller may execute PHP.
    location ~ ^/index\.php(/|$) {
        # "app" is the FPM service name on the Docker network.
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        # Path as seen inside the FPM container, not on the nginx side.
        fastcgi_param SCRIPT_FILENAME /app/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /app/public;
        internal;
    }

    # Reject any other attempt to run a .php file.
    location ~ \.php$ {
        return 404;
    }

    client_max_body_size 16m;

    error_log /dev/stderr;
    access_log /dev/stdout;
}
