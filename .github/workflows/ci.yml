name: CI

# Push → Test → Package
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Test ─────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, intl, opcache, zip, apcu
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Validate composer.json / composer.lock
        # --no-check-publish: this is an app, not a publishable package,
        # so name/description are intentionally absent.
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Lint YAML configuration
        run: php bin/console lint:yaml config --parse-tags

      - name: Lint the dependency-injection container
        run: php bin/console lint:container

      - name: Run test suite
        run: |
          if [ -x vendor/bin/phpunit ]; then
            vendor/bin/phpunit
          else
            echo "No PHPUnit suite installed yet — skipping (add symfony/test-pack to enable)."
          fi

  # ── Package ──────────────────────────────────────────────────
  package:
    name: Package (Docker)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images (app + web) with layer cache
        uses: docker/bake-action@v5
        with:
          files: compose.yaml
          load: true
          set: |
            app.cache-from=type=gha,scope=app
            app.cache-to=type=gha,scope=app,mode=max
            web.cache-from=type=gha,scope=web
            web.cache-to=type=gha,scope=web,mode=max

      - name: Start the stack
        run: docker compose up -d --no-build

      - name: Wait for the server to accept connections
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:8080/; then
              echo "Server is up."; exit 0
            fi
            sleep 2
          done
          echo "Server did not come up in time."; docker compose logs; exit 1

      - name: Verify Symfony boots in prod
        run: docker compose exec -T app php bin/console about

      - name: HTTP smoke test
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/)
          echo "HTTP status: $code"
          # 200 (a route) or 404 (no route yet) both prove the app booted and routed.
          if [ "$code" != "200" ] && [ "$code" != "404" ]; then
            echo "Unexpected status $code"; docker compose logs; exit 1
          fi

      - name: Dump container logs
        if: always()
        run: docker compose logs || true
